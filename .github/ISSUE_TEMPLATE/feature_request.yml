name: Feature Request
description: Suggest new content, examples, or improvements
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New example for existing module
        - New module or tutorial
        - Improvement to existing content
        - New troubleshooting entry
        - Translation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or improved?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any references, links, or examples that would help?
